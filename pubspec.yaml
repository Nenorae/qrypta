name: qrypta
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Assets ---
  cupertino_icons: ^1.0.8
  pinput: ^5.0.1
  qr_flutter: ^4.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10

  # --- Utilities ---
  shared_preferences: ^2.5.3
  mobile_scanner: ^7.0.1
  share_plus: ^11.0.0
  path_provider: ^2.1.2
  collection: ^1.19.1
  convert: ^3.1.2

  # --- Web3 & Cryptography ---
  web3dart: ^2.7.1
  crypto: ^3.0.6

  # --- Security ---
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  # --- State Management ---
  flutter_riverpod: ^2.6.1
  provider: ^6.1.5

  # --- Networking (API) ---
  http: ^1.4.0
  graphql: ^5.2.3
  graphql_flutter: ^5.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # --- Local Database (Cache) ---
  hive_ce: ^2.0.0      
  hive_ce_flutter: ^2.0.0
  shimmer: ^3.0.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  yaml: ^3.1.3
  build_runner: ^2.4.8
  freezed: ^3.2.5
  json_serializable: ^6.12.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/fonts/